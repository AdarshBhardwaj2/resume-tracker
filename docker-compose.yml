version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: resume-tracker-db
    environment:
      POSTGRES_DB: resume_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
    container_name: resume-tracker-api
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/resume_tracker
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:4173
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
    container_name: resume-tracker-ui
    ports:
      - "4173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
